    <!-- Modal Crear Medalla -->
    <div class="modal fade" id="createMedalModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-hero text-white">
                    <h5 class="modal-title"><i class="fas fa-plus"></i> Crear Nueva Medalla</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createMedalForm">
                        <div class="mb-3">
                            <label class="form-label">Nombre de la Medalla:</label>
                            <input type="text" class="form-control" id="medalName" placeholder="Ej: Medalla de Valiente" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Icono/Emoji:</label>
                            <input type="text" class="form-control" id="medalIcon" placeholder="Ej: 🏆, 🎯, 🌟" maxlength="2" required>
                            <small class="text-muted">Usa un emoji o símbolo (máximo 2 caracteres)</small>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">Descripción:</label>
                            <textarea class="form-control" id="medalDescription" placeholder="Describe qué representa esta medalla..." rows="3" required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                    <button type="button" class="btn btn-primary" onclick="createNewMedal()">
                        <i class="fas fa-save"></i> Crear Medalla
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/superheroes.js"></script>
    <script src="js/medals.js"></script>
